<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#FFFBF3"/>

  <text x="60" y="60" font-family="serif" font-size="36" font-weight="600" fill="#3B2A2E">Bundle · palette options</text>
  <text x="60" y="92" font-family="sans-serif" font-size="16" fill="#3B2A2E" opacity="0.6">Pick one to ship. Each five-token system covers background, primary, accent, success, foreground.</text>

  <g transform="translate(60 140)">
    <text x="0" y="0" font-family="serif" font-size="22" font-weight="600" fill="#3B2A2E">A. Soft sunrise (recommended)</text>
    <text x="0" y="24" font-family="sans-serif" font-size="13" fill="#3B2A2E" opacity="0.6">Warm peach + blush + cream. Universal, gender-neutral.</text>

    <g transform="translate(0 40)">
      <rect x="0"   y="0" width="200" height="170" rx="20" fill="#FFD3B0"/>
      <rect x="220" y="0" width="200" height="170" rx="20" fill="#F5A097"/>
      <rect x="440" y="0" width="200" height="170" rx="20" fill="#FFF7EE" stroke="#3B2A2E" stroke-opacity="0.1"/>
      <rect x="660" y="0" width="200" height="170" rx="20" fill="#3B2A2E"/>
      <rect x="880" y="0" width="200" height="170" rx="20" fill="#A9C4A0"/>

      <g font-family="sans-serif" font-size="11">
        <text x="14" y="186" fill="#3B2A2E">peach-300 · #FFD3B0</text>
        <text x="234" y="186" fill="#3B2A2E">blush-400 · #F5A097</text>
        <text x="454" y="186" fill="#3B2A2E">cream-50 · #FFF7EE</text>
        <text x="674" y="186" fill="#3B2A2E">plum-800 · #3B2A2E</text>
        <text x="894" y="186" fill="#3B2A2E">sage-300 · #A9C4A0</text>
      </g>
    </g>
  </g>

  <g transform="translate(60 420)">
    <text x="0" y="0" font-family="serif" font-size="22" font-weight="600" fill="#1E2A3B">B. Sage &amp; cream</text>
    <text x="0" y="24" font-family="sans-serif" font-size="13" fill="#1E2A3B" opacity="0.6">Modern, gender-neutral, designy. Ages a little faster.</text>

    <g transform="translate(0 40)">
      <rect x="0"   y="0" width="200" height="170" rx="20" fill="#A9C4A0"/>
      <rect x="220" y="0" width="200" height="170" rx="20" fill="#F7F2E6"/>
      <rect x="440" y="0" width="200" height="170" rx="20" fill="#C97D60"/>
      <rect x="660" y="0" width="200" height="170" rx="20" fill="#1E2A3B"/>
      <rect x="880" y="0" width="200" height="170" rx="20" fill="#E6B450"/>

      <g font-family="sans-serif" font-size="11">
        <text x="14" y="186" fill="#1E2A3B">sage-300 · #A9C4A0</text>
        <text x="234" y="186" fill="#1E2A3B">cream-100 · #F7F2E6</text>
        <text x="454" y="186" fill="#1E2A3B">clay-500 · #C97D60</text>
        <text x="674" y="186" fill="#1E2A3B">navy-800 · #1E2A3B</text>
        <text x="894" y="186" fill="#1E2A3B">gold-400 · #E6B450</text>
      </g>
    </g>
  </g>

  <g transform="translate(60 700)">
    <text x="0" y="0" font-family="serif" font-size="22" font-weight="600" fill="#3A2A4A">C. Buttercup &amp; lilac</text>
    <text x="0" y="24" font-family="sans-serif" font-size="13" fill="#3A2A4A" opacity="0.6">Vintage, sweet. Strongest with old-fashioned-name audience.</text>

    <g transform="translate(0 40)">
      <rect x="0"   y="0" width="200" height="130" rx="20" fill="#FFE7A8"/>
      <rect x="220" y="0" width="200" height="130" rx="20" fill="#D8C5E8"/>
      <rect x="440" y="0" width="200" height="130" rx="20" fill="#FBF6EC"/>
      <rect x="660" y="0" width="200" height="130" rx="20" fill="#3A2A4A"/>
      <rect x="880" y="0" width="200" height="130" rx="20" fill="#F08A7D"/>
    </g>
  </g>
</svg>
